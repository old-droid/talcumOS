<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TalcumOS</title>
    <link rel="stylesheet" href="springboard.css">
    <style>
        /* Quick styles for the combined view */
        .app-window {
            border-radius: 0;
        }
        
        .icon-grid {
            margin-bottom: 20px;
        }
        
        .springboard {
            height: 100vh;
        }
    </style>
</head>
<body>
    <!-- Wallpaper Background -->
    <div class="wallpaper"></div>

    <!-- Lock Screen Layer -->
    <div class="lock-screen" id="lockScreen">
        <div class="time-container">
            <div class="time-display" id="timeDisplay">9:41</div>
            <div class="date-display" id="dateDisplay">Tuesday, March 17</div>
        </div>
        
        <div class="unlock-hint" id="unlockHint">
            <div class="slider-container">
                <div class="swipe-text">Swipe to unlock</div>
                <div class="slider-track">
                    <div class="slider-thumb" id="sliderThumb">
                        <div class="arrow-icon"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="home-indicator"></div>
        
        <!-- Setup link on lock screen -->
        <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
            <a href="setup.html" target="_blank" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;">
                ⚙️ Setup
            </a>
        </div>
    </div>

    <!-- Home Screen / Springboard -->
    <div class="home-screen" id="homeScreen">
        <div class="springboard" id="springboard">
            <div class="icon-grid" id="iconGrid">
                <!-- Icons will be populated by JavaScript -->
            </div>
            
            <!-- Dock -->
            <div class="dock" id="dock">
                <div class="app-icon" data-app="files">
                    <div class="icon-image app-files">📁</div>
                    <div class="icon-label">Files</div>
                </div>
                <div class="app-icon" data-app="notes">
                    <div class="icon-image app-notes">📝</div>
                    <div class="icon-label">Notes</div>
                </div>
                <div class="app-icon" data-app="calculator">
                    <div class="icon-image app-calculator">🧮</div>
                    <div class="icon-label">Calculator</div>
                </div>
                <div class="app-icon" data-app="music">
                    <div class="icon-image app-music">🎵</div>
                    <div class="icon-label">Music</div>
                </div>
            </div>
            
            <div class="home-indicator"></div>
        </div>
    </div>

    <!-- App Window Template -->
    <div class="app-window" id="appWindow">
        <div class="app-window-header">
            <div class="app-window-title" id="appWindowTitle">App Name</div>
            <button class="app-close-btn" id="appCloseBtn">×</button>
        </div>
        <div class="app-window-content" id="appWindowContent">
            <!-- App content goes here -->
        </div>
    </div>

    <!-- Setup Link (shown when not logged in) -->
    <div class="setup-link hidden" id="setupLink">
        <a href="setup.html" target="_blank">⚙️ Open Setup Page</a>
    </div>

    <!-- Auth Overlay -->
    <div class="auth-overlay" id="authOverlay">
        <h2 id="authTitle">Welcome</h2>
        <p class="auth-subtitle" id="authSubtitle">Sign in to unlock your device</p>
        
        <div class="auth-form">
            <div class="auth-input-group">
                <label for="emailInput">Email</label>
                <input type="email" id="emailInput" placeholder="Enter your email" autocomplete="email">
            </div>
            <div class="auth-input-group">
                <label for="passwordInput">Password</label>
                <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <div class="auth-error" id="authError"></div>
            <button class="auth-btn" id="authSubmitBtn">Sign In</button>
        </div>
        
        <p class="auth-switch">
            <span id="authSwitchText">Don't have an account?</span>
            <button id="authSwitchBtn" class="auth-switch-btn">Sign Up</button>
        </p>
        <p style="margin-top: 20px; text-align: center;">
            <a href="setup.html" target="_blank" style="color: #5AC8FA; text-decoration: none; font-size: 13px;">
                ⚙️ Open Setup Page
            </a>
        </p>
    </div>

    <!-- Debug Log -->
    <div class="debug-log" id="debugLog" style="position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #0f0; padding: 15px; border-radius: 8px; font-size: 10px; font-family: monospace; max-width: 300px; max-height: 200px; overflow-y: auto; z-index: 9999; border: 1px solid #0f0;"></div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="kernel.js"></script>
    <!-- PGlite import commented out due to module export issues
    <script type="module">
        import { PGlite } from 'https://cdn.jsdelivr.net/npm/@electric-sql/pglite@0.3.15/dist/pglite.js';
        window.PGlite = PGlite;
    </script>
    -->
    <script>
        // Load Supabase library and resolve kernel init promise
        (function() {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
            script.onload = function() {
                console.log('Supabase library loaded');
                if (window.kernelInitPromise && window.kernelInitPromise.resolve) {
                    window.kernelInitPromise.resolve();
                }
            };
            script.onerror = function() {
                console.error('Failed to load Supabase library');
                if (window.kernelInitPromise && window.kernelInitPromise.reject) {
                    window.kernelInitPromise.reject(new Error('Failed to load Supabase library'));
                }
            };
            document.head.appendChild(script);
        })();
    </script>
    <script type="module" src="vfs.js"></script>
    <script type="module" src="state-manager.js"></script>
    <script type="module" src="apps.js"></script>
    
    <script>
        // ==================== DEBUG LOGGING ====================
        const DEBUG_LOG = [];
        const MAX_LOGS = 50;

        function log(tag, message) {
            const timestamp = new Date().toLocaleTimeString();
            const logMsg = `[${timestamp}] ${tag}: ${message}`;
            console.log(logMsg);
            
            DEBUG_LOG.push(logMsg);
            if (DEBUG_LOG.length > MAX_LOGS) DEBUG_LOG.shift();
            
            updateDebugDisplay();
        }

        function updateDebugDisplay() {
            const debugDiv = document.getElementById('debugLog');
            if (!debugDiv) return;
            debugDiv.innerHTML = DEBUG_LOG.map(msg => `<div>${msg}</div>`).join('');
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        log('INIT', 'springboard.html loaded');

        // ==================== CONFIGURATION ====================
        let authMode = 'signin'; // 'signin' or 'signup'
        let currentApp = null;

        // ==================== TIME DISPLAY ====================
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();

            const timeDisplay = document.getElementById('timeDisplay');
            if (timeDisplay) {
                const displayHours = hours % 12 || 12;
                const displayMinutes = minutes.toString().padStart(2, '0');
                timeDisplay.textContent = `${displayHours}:${displayMinutes}`;
            }

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            const dateDisplay = document.getElementById('dateDisplay');
            if (dateDisplay) {
                dateDisplay.textContent = now.toLocaleDateString('en-US', options);
            }
        }

        // ==================== SLIDER FUNCTIONALITY ====================
        let sliderThumb, sliderTrack;
        let isDragging = false;
        let startX = 0;
        let thumbStartX = 0;

        function initializeSlider() {
            log('SLIDER', 'Initializing slider...');
            
            sliderThumb = document.getElementById('sliderThumb');
            sliderTrack = document.querySelector('.slider-track');

            if (!sliderThumb || !sliderTrack) {
                log('SLIDER', 'ERROR: Elements not found!');
                return;
            }

            sliderThumb.addEventListener('mousedown', handleStart);
            sliderThumb.addEventListener('touchstart', handleStart);

            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', handleMove);

            document.addEventListener('mouseup', handleEnd);
            document.addEventListener('touchend', handleEnd);

            log('SLIDER', '✓ Slider ready');
        }

        function getMaxSlide() {
            if (!sliderTrack || !sliderThumb) return 0;
            return sliderTrack.offsetWidth - sliderThumb.offsetWidth - 6;
        }

        function handleStart(e) {
            if (!sliderThumb) return;
            isDragging = true;

            if (e.touches) {
                e.preventDefault();
            }

            startX = e.type.includes('mouse') ? e.clientX : (e.touches ? e.touches[0].clientX : 0);
            thumbStartX = sliderThumb.offsetLeft;
            sliderThumb.style.transition = '';
            sliderThumb.style.cursor = 'grabbing';
        }

        function handleMove(e) {
            if (!isDragging || !sliderThumb) return;

            if (e.touches) {
                e.preventDefault();
            }

            const clientX = e.type.includes('mouse') ? e.clientX : (e.touches ? e.touches[0].clientX : 0);
            let newX = thumbStartX + (clientX - startX);
            const maxSlide = getMaxSlide();

            if (newX < 0) newX = 0;
            if (newX > maxSlide) newX = maxSlide;

            sliderThumb.style.left = `${newX}px`;

            const progress = maxSlide > 0 ? (newX / maxSlide) * 100 : 0;

            if (progress > 30) {
                sliderThumb.classList.add('unlocking');
            } else {
                sliderThumb.classList.remove('unlocking');
            }
        }

        function handleEnd() {
            if (!isDragging || !sliderThumb) return;
            isDragging = false;
            sliderThumb.style.cursor = 'grab';

            const maxSlide = getMaxSlide();
            const currentPosition = sliderThumb.offsetLeft;
            sliderThumb.style.transition = 'left 0.3s ease-out';

            const threshold = maxSlide * 0.8;

            if (currentPosition >= threshold) {
                sliderThumb.style.left = `${maxSlide}px`;
                sliderThumb.style.background = 'rgba(52, 199, 89, 0.9)';
                sliderThumb.innerHTML = '<div class="unlock-icon"></div>';
                log('DRAG', '✓ UNLOCKED!');

                setTimeout(() => {
                    handleUnlock();
                }, 500);
            } else {
                sliderThumb.style.left = '6px';
                sliderThumb.style.background = 'rgba(255,255,255,0.9)';
                sliderThumb.classList.remove('unlocking');
                sliderThumb.innerHTML = '<div class="arrow-icon"></div>';
            }
        }

        // ==================== AUTH FUNCTIONS ====================
        function showAuthError(message) {
            const errorDiv = document.getElementById('authError');
            if (errorDiv) errorDiv.textContent = message;
            log('AUTH', `Error: ${message}`);
        }

        function clearAuthError() {
            const errorDiv = document.getElementById('authError');
            if (errorDiv) errorDiv.textContent = '';
        }

        async function handleAuthSubmit() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;

            if (!email || !password) {
                showAuthError('Please enter email and password');
                return;
            }

            try {
                if (authMode === 'signin') {
                    log('AUTH', `Signing in with ${email}`);
                    await window.DB.signIn(email, password);
                    log('AUTH', 'Sign in successful');
                } else {
                    log('AUTH', `Signing up with ${email}`);
                    await window.DB.signUp(email, password);
                    log('AUTH', 'Sign up successful');
                }
                showUnlocked();
            } catch (e) {
                showAuthError(e.message);
                log('AUTH', `Auth failed: ${e.message}`);
            }
        }

        function toggleAuthMode() {
            authMode = authMode === 'signin' ? 'signup' : 'signin';
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const switchText = document.getElementById('authSwitchText');
            const switchBtn = document.getElementById('authSwitchBtn');

            if (authMode === 'signup') {
                title.textContent = 'Create Account';
                subtitle.textContent = 'Sign up to unlock your device';
                submitBtn.textContent = 'Sign Up';
                switchText.textContent = 'Already have an account?';
                switchBtn.textContent = 'Sign In';
            } else {
                title.textContent = 'Welcome';
                subtitle.textContent = 'Sign in to unlock your device';
                submitBtn.textContent = 'Sign In';
                switchText.textContent = 'Don\'t have an account?';
                switchBtn.textContent = 'Sign Up';
            }
            clearAuthError();
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        function showAuthOverlay() {
            log('AUTH', 'Showing auth overlay');
            const overlay = document.getElementById('authOverlay');
            overlay.classList.add('active');
            clearAuthError();
        }

        function hideAuthOverlay() {
            const overlay = document.getElementById('authOverlay');
            overlay.classList.remove('active');
        }

        async function showUnlocked() {
            log('AUTH', 'Device unlocked!');
            hideAuthOverlay();
            
            // Hide lock screen
            const lockScreen = document.getElementById('lockScreen');
            if (lockScreen) {
                lockScreen.classList.add('hidden');
            }
            
            // Show home screen
            const homeScreen = document.getElementById('homeScreen');
            if (homeScreen) {
                homeScreen.classList.add('active');
            }

            // Initialize state manager and sync layout
            try {
                if (window.StateManager) {
                    await window.StateManager.init();
                    log('STATE', 'StateManager initialized');
                    
                    // Sync all state (creates default layout if needed)
                    await window.StateManager.syncAll();
                    log('STATE', 'State synced');
                    
                    // Load and render layout
                    const layout = await window.StateManager.loadLayout();
                    renderSpringboard(layout);
                    log('STATE', 'Layout loaded and rendered');
                }
            } catch (e) {
                log('STATE', `Failed to load layout: ${e.message}`);
                // Fallback to default layout
                renderSpringboard(window.StateManager?.getDefaultLayout() || []);
            }
        }

        // ==================== UNLOCK HANDLER ====================
        async function handleUnlock() {
            log('UNLOCK', 'Handling unlock...');
            
            try {
                const isLoggedIn = await window.DB.checkAuthSetup();
                log('UNLOCK', `Auth status: ${isLoggedIn}`);

                if (isLoggedIn) {
                    log('UNLOCK', 'User is logged in - unlocking device');
                    showUnlocked();
                } else {
                    log('UNLOCK', 'User is not logged in - showing auth overlay and setup link');
                    showAuthOverlay();
                    document.getElementById('setupLink').classList.remove('hidden');
                }
            } catch (e) {
                log('UNLOCK', `Error in handleUnlock: ${e.message}`);
                showAuthOverlay();
                document.getElementById('setupLink').classList.remove('hidden');
            }
        }

        // ==================== SPRINGBOARD RENDERING ====================
        function renderSpringboard(layout) {
            const grid = document.getElementById('iconGrid');
            if (!grid) return;

            grid.innerHTML = '';

            layout.forEach(app => {
                const appIcon = document.createElement('div');
                appIcon.className = 'app-icon';
                appIcon.dataset.app = app.id;
                appIcon.innerHTML = `
                    <div class="icon-image app-${app.id}">${app.icon}</div>
                    <div class="icon-label">${app.name}</div>
                `;
                appIcon.addEventListener('click', () => openApp(app.id));
                grid.appendChild(appIcon);
            });
        }

        // ==================== APP MANAGEMENT ====================
        async function openApp(appId) {
            log('APP', `Opening app: ${appId}`);
            log('APP', `window.apps: ${window.apps ? 'available' : 'NOT AVAILABLE'}`);
            log('APP', `window.apps keys: ${window.apps ? Object.keys(window.apps).join(', ') : 'N/A'}`);
            
            // Wait for window.apps to be available (in case module is still loading)
            let retries = 0;
            while (!window.apps && retries < 50) {
                await new Promise(resolve => setTimeout(resolve, 100));
                retries++;
            }
            
            if (!window.apps) {
                log('APP', `window.apps still not available after ${retries} retries`);
                return;
            }
            
            const app = window.apps[appId];
            
            if (!app) {
                log('APP', `App not found: ${appId}`);
                log('APP', `Available apps: ${window.apps ? Object.keys(window.apps).join(', ') : 'N/A'}`);
                return;
            }

            currentApp = app;
            
            // Update window title
            const titleEl = document.getElementById('appWindowTitle');
            if (titleEl) titleEl.textContent = app.name;
            
            // Render app content
            const contentEl = document.getElementById('appWindowContent');
            if (contentEl) {
                try {
                    const content = await app.render();
                    contentEl.innerHTML = content;
                } catch (e) {
                    log('APP', `Error rendering app: ${e.message}`);
                    contentEl.innerHTML = `<div class="app-content" style="padding: 20px;"><h2>Error</h2><p>${e.message}</p></div>`;
                }
            }
            
            // Show app window
            const appWindow = document.getElementById('appWindow');
            if (appWindow) {
                appWindow.classList.add('active');
            }

            // Load app state if available
            if (app.loadState) {
                try {
                    await app.loadState();
                    if (contentEl) {
                        const content = await app.render();
                        contentEl.innerHTML = content;
                    }
                } catch (e) {
                    log('APP', `Error loading app state: ${e.message}`);
                }
            }

            // Setup file manager event handlers
            if (appId === 'files') {
                setupFileManagerHandlers();
            }
            
            // Setup terminal event handlers
            if (appId === 'terminal') {
                setupTerminalHandlers();
            }
        }

        function setupTerminalHandlers() {
            const input = document.getElementById('terminal-input');
            if (input) {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const command = input.value;
                        if (command && window.apps.terminal) {
                            window.apps.terminal.execute(command);
                            input.value = '';
                        }
                    }
                });
                
                input.addEventListener('focus', () => {
                    // Keep focus on terminal input
                });
            }
        }

        function setupFileManagerHandlers() {
            // Setup breadcrumb navigation
            const breadcrumbItems = document.querySelectorAll('.breadcrumb-item');
            breadcrumbItems.forEach(item => {
                item.addEventListener('click', async (e) => {
                    const path = e.target.dataset.path;
                    if (path && window.apps.files) {
                        await window.apps.files.navigate(path);
                    }
                });
            });

            // Setup file item click handlers
            const fileItems = document.querySelectorAll('.file-item');
            fileItems.forEach(item => {
                item.addEventListener('click', async (e) => {
                    const name = e.currentTarget.dataset.name;
                    const type = e.currentTarget.dataset.type;
                    if (name && window.apps.files) {
                        await window.apps.files.selectFile(name);
                    }
                });

                item.addEventListener('dblclick', async (e) => {
                    const name = e.currentTarget.dataset.name;
                    if (name && window.apps.files) {
                        await window.apps.files.openItem(name);
                    }
                });

                item.addEventListener('contextmenu', (e) => {
                    const name = e.currentTarget.dataset.name;
                    if (name && window.apps.files) {
                        window.apps.files.showContextMenu(name, e);
                    }
                });
            });
        }

        function closeApp() {
            log('APP', 'Closing app');
            const appWindow = document.getElementById('appWindow');
            if (appWindow) {
                appWindow.classList.remove('active');
            }
            currentApp = null;
        }

        // ==================== INITIALIZATION ====================
        window.addEventListener('DOMContentLoaded', async () => {
            log('INIT', 'DOMContentLoaded event fired');

            // Initialize time display
            updateTime();
            setInterval(updateTime, 1000);

            // Initialize slider
            initializeSlider();

            // Wait for DB to be available
            let retries = 0;
            while (!window.DB && retries < 50) {
                await new Promise(resolve => setTimeout(resolve, 100));
                retries++;
            }

            if (!window.DB) {
                log('INIT', 'Database NOT available');
                alert('System error: Database not available. Please check console logs.');
                return;
            } else {
                log('INIT', 'Database is available');
            }

            // Setup event listeners
            document.getElementById('authSubmitBtn').addEventListener('click', handleAuthSubmit);
            document.getElementById('authSwitchBtn').addEventListener('click', toggleAuthMode);
            document.getElementById('appCloseBtn').addEventListener('click', closeApp);
            
            document.getElementById('emailInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('passwordInput').focus();
            });
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleAuthSubmit();
            });

            // Setup dock icons
            const dockIcons = document.querySelectorAll('#dock .app-icon');
            dockIcons.forEach(icon => {
                icon.addEventListener('click', () => {
                    const appId = icon.dataset.app;
                    openApp(appId);
                });
            });

            // Check auth status
            try {
                const isLoggedIn = await window.DB.checkAuthSetup();
                if (isLoggedIn) {
                    showUnlocked();
                } else {
                    // Show lock screen, user needs to swipe to unlock
                    log('INIT', 'User not logged in, waiting for unlock swipe');
                }
            } catch (e) {
                log('INIT', `Error checking auth: ${e.message}`);
            }

            // Initialize and test VFS
            try {
                log('VFS', 'Initializing VFS...');
                await window.DB.initVFS();
                log('VFS', 'VFS initialized successfully');
                
                if (window.VFS) {
                    log('VFS', 'Starting VFS tests...');
                    try {
                        // Create some test files with different types
                        await window.VFS.writeFile('/home/user/test.txt', 'Hello, VFS!');
                        await window.VFS.writeFile('/home/user/document.md', '# Test Document\n\nThis is a test document.');
                        await window.VFS.writeFile('/home/user/style.css', 'body { background: white; }');
                        await window.VFS.writeFile('/home/user/script.js', 'console.log("Hello, VFS!");');
                        await window.VFS.writeFile('/home/user/data.json', '{"name": "test", "value": 123}');
                        
                        // Create a subdirectory
                        await window.VFS.mkdir('/home/user/subdir');
                        await window.VFS.writeFile('/home/user/subdir/nested.txt', 'This is in a subdirectory');
                        
                        // List files
                        const files = await window.VFS.listDirectory('/home/user');
                        log('VFS', `Files in /home/user: ${files.map(f => f.name).join(', ')}`);
                        
                        // Test file type detection
                        const txtType = await window.VFS.getFileType('/home/user/test.txt');
                        const mdType = await window.VFS.getFileType('/home/user/document.md');
                        const cssType = await window.VFS.getFileType('/home/user/style.css');
                        const jsType = await window.VFS.getFileType('/home/user/script.js');
                        const jsonType = await window.VFS.getFileType('/home/user/data.json');
                        log('VFS', `File types: .txt=${txtType}, .md=${mdType}, .css=${cssType}, .js=${jsType}, .json=${jsonType}`);
                        
                        // Test disk usage
                        const usage = await window.VFS.getDiskUsage('/home/user');
                        log('VFS', `Disk usage: ${usage.total} bytes, ${usage.files} files, ${usage.directories} directories`);
                        
                        // Test symbolic link
                        await window.VFS.symlink('/home/user/test.txt', '/home/user/link.txt');
                        const linkTarget = await window.VFS.readlink('/home/user/link.txt');
                        log('VFS', `Symbolic link created: link.txt -> ${linkTarget}`);
                        
                        log('VFS', 'All VFS tests completed successfully!');
                    } catch (e) {
                        log('VFS', `Error testing VFS: ${e.message}`);
                    }
                }
            } catch (e) {
                log('VFS', `Failed to initialize VFS: ${e.message}`);
            }

            log('INIT', 'Springboard initialization complete');
        });

        // Expose functions globally for debug/testing
        window.springboard = {
            renderSpringboard,
            openApp,
            closeApp,
            showUnlocked
        };
    </script>
</body>
</html>
